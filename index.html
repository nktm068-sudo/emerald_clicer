<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изумрудик AI</title>
    
    <!-- Твой Изумрудный Герб (Прямая ссылка) -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/emoji/48/emerald-gem.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="emerald" title="Нажми и говори"></div>
    
    <h1>Изумрудик</h1>
    <p id="status">Нажми на круг или напиши вопрос</p>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Спросите о чём угодно..." autocomplete="off">
        <button id="send-btn" title="Отправить">
            <span class="arrow-up">↑</span>
        </button>
    </div>

    <div id="ai-answer"></div>

    <script src="script.js"></script>
</body>
</html>
